<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Stencil Component Starter</title>

  <script type="module" src="build/sirius.esm.js"></script>
  <script nomodule src="build/sirius.js"></script>

</head>

<body>  
  <sirius-wf></sirius-wf>
  <hr/>
  <span>Custom Workflow</span>  
  <textarea id="processDef" style="width: 100%;height:500px">
    {
      "name": "Workflow1",
      "activities": [
        {
          "name": "start",
          "components": [
            { "tag": "polaris-label" },
            { "tag": "polaris-select", "id": "registration.numberSelect" },
            { "tag": "polaris-select", "id": "registration.numberSelect2" },       
            { "tag": "input", "id": "registration.firstName" },
            { "tag": "polaris-button", "id": "nextButton", "caption":"Next", "next": "page1"}
          ]    
        },
        {
          "name": "page1",
          "components": [                        
            { "tag": "input", "id": "registration.firstName" },
            { "tag": "input", "id": "registration.lastName" },
            { "tag": "polaris-button", "id":"nextButton", "caption":"Previous", "next": "start"}
          ]    
        }
      ]
    }
  </textarea> 
  <button id="loadProcessButton">Load New Process</button>
    
  <script type="module">           
    const wf = document.querySelector("sirius-wf");
    const processDef = document.querySelector("#processDef");
    const loadProcessButton = document.querySelector("#loadProcessButton");

    setTimeout(() => {
      const process = JSON.parse(processDef.value.trim());
      wf.loadProcess(process);
    }, 0);    
   
    loadProcessButton.addEventListener("click", () => {
      try {                
        const process = JSON.parse(processDef.value.trim());
        const event = new CustomEvent("loadProcess",  {detail: process});
            
        wf.dispatchEvent(event);
      }
      catch(ex) {
        console.dir(ex);
      }
    })    
  </script>
</body>
</html>
