<!DOCTYPE html>
<html dir="ltr" lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=5.0">
  <title>Stencil Component Starter</title>

  <script type="module" src="build/sirius.esm.js"></script>
  <script nomodule src="build/sirius.js"></script>

</head>

<body>    
  <sirius-wf style="display: block;min-height: 100px;"></sirius-wf>
  <hr/>
  <span>Custom Workflow</span>  
  <textarea id="processDef" style="width: 100%;height:300px"></textarea> 
  <select id="workflow">
    <option value="-1">Select an option</option>
    <option value="default.wf.json">Default</option>
    <option value="demo.wf.json">Demo</option>
  </select>

  <button id="defaultWfButton">Load Default</button>
  <button id="loadProcessButton">Load New Process</button>
  <button id="clearErrorsButton">Clear Errors</button>  
  <br>
  <textarea id="errorMsg" readonly="readonly" style="resize: none;color:darkred;font-weight:bolder;width: 47%;height:100px"></textarea>
  <textarea id="errorStack" readonly="readonly" style="resize: none;color:darkred;font-weight:bolder;width: 47%;height:100px"></textarea>
    
  <script>    
    class MoonButton extends HTMLElement {
      static get observedAttributes() { return ['name', 'id', 'value', 'next']; }

      connectedCallback() {             
          this.attachShadow({mode: 'open'});
          this.shadowRoot.innerHTML = `<button/>${this.attributes.value.value}</button>`;

          this.button = this.shadowRoot.querySelector("button");

          this.handler = this.clickHandler.bind(this);          
          this.button.addEventListener('click', this.handler);
        }
        
        attributeChangedCallback(name, oldValue, newValue) {
          if(name === "value" && this.button)
            this.button.innerText =  newValue;         
        }

        disconnectedCallback() {         
          this.button.removeEventListener('click', this.handler);
        }

        clickHandler() {
          const next = this.attributes.next.value;  
          this.context.wfService.setNextAction(next);         
        }
    }

  
    const register = () => customElements.define('moon-button', MoonButton);
    window.WebComponents ? window.WebComponents.waitFor(register) : register();
  </script>

  <script>      
      class AlertActivity {
        static type = "alert-activity";

        static create(act) {
            return Object.assign(new AlertActivity(), act);
        }
    
        type = AlertActivity.type;
        execute = (context) => alert(this.message);
      }
  </script>

  <script type="module">
    const errorMsg = document.querySelector("#errorMsg");
    const errorStack = document.querySelector("#errorStack");
    const clearErrorsButton = document.querySelector("#clearErrorsButton");
    const defaultWfButton = document.querySelector("#defaultWfButton");
    const workflow = document.querySelector("#workflow");

    const wf = document.querySelector("sirius-wf");
    const processDef = document.querySelector("#processDef");
    const loadProcessButton = document.querySelector("#loadProcessButton");

    setTimeout(() => wf.addActivity(AlertActivity.type, AlertActivity.create), 0);
    
    wf.addEventListener("wfError", (event) => {           
      errorMsg.innerText = event.detail.message;
      errorStack.innerText = event.detail.stack;
    });

    clearErrorsButton.addEventListener('click', () => {
      errorMsg.innerText = "";
      errorStack.innerText = "";
    });

    loadProcessButton.addEventListener("click", async () => {      
      const process = await wf.parse(processDef.value);

      if(!process)
        return;
        
        wf.loadProcess(process);        
    })    

    defaultWfButton.addEventListener("click", async () => {
      if(workflow.value === "-1") {
        processDef.value = "";
        wf.loadProcess({}); 
        return;
      }

      fetch("wf/" + workflow.value)
        .then(response => response.text())
        .then(data => {  
          
          processDef.value = data;
          
          wf.parse(data).then(process => {
            if(!process)
            return;
        
            wf.loadProcess(process); 
          });         
        });
    });
  </script>
</body>
</html>
